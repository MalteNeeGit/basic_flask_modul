<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Flask Blog</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>
    <h1>Welcome to My Flask Blog!</h1>
    <div class="btn-wrapper">
    <a class="btn" href="{{ url_for('add') }}">Erstelle einen neuen Beitrag</a>
    </div>
    <div class="container">
    {% for post in posts %}
    <div class="post">
        <h2>{{ post['title'] }}</h2>
        <p class="meta"><em>Written by {{ post['author'] }}</em></p>
        <p>{{ post['content'] }}</p>
        <div class="post-actions">
            <a class="btn btn-delete" href="{{ url_for('delete', post_id=post['id']) }}">Lösche diesen Post</a>
            <a class="btn btn-edit" href="{{ url_for('update', post_id=post['id']) }}">Ändere diesen Post</a>
        </div>

    </div>
    {% endfor %}
    </div>

</body>
</html>
